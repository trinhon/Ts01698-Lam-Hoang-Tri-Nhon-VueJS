    <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Navbar</title>

    <!-- Bootstrap 3 CSS -->
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <style>
        .navbar {
            border-radius: 0;
            margin-bottom: 0;
        }
        .navbar-brand img {
            height: 35px;
            margin-top: -8px;
        }
        .navbar-right.language a {
            padding-top: 15px;
            padding-bottom: 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-default">
    <div class="container">

        <!-- Mobile toggle -->
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed"
                    data-toggle="collapse" data-target="#main-navbar">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>

            <!-- Logo -->
            <a class="navbar-brand" href="#">
                <img src="/images/logo-energy-pilates.png" alt="Logo">
            </a>
        </div>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="main-navbar">

            <ul class="nav navbar-nav">
                <li>
                    <a href="#">
                        <span class="glyphicon glyphicon-file"></span> Bài viết
                    </a>
                </li>
                <li>
                    <a href="#">
                        <span class="glyphicon glyphicon-facetime-video"></span> Video
                        
                    </a>
                </li>
                <li>
                    <a href="#">
                        <span class="glyphicon glyphicon-info-sign"></span> Giới thiệu
                    </a>
                </li>
                <li>
                    <a href="#">
                        <span class="glyphicon glyphicon-calendar"></span> Sự kiện
                    </a>
                </li>

                <!-- Dropdown -->
                <li class="dropdown">
                    <a href="#" class="dropdown-toggle" data-toggle="dropdown">
                        <span class="glyphicon glyphicon-user"></span> Tài khoản
                        <span class="caret"></span>
                    </a>
                    <ul class="dropdown-menu">
                        <li><a href="#">Đăng nhập</a></li>
                        <li><a href="#">Quên mật khẩu</a></li>
                        <li><a href="#">Đăng ký thành viên</a></li>
                    </ul>
                </li>
            </ul>

            <!-- Language -->
            <ul class="nav navbar-nav navbar-right language">
                <li><a href="#">Tiếng Việt</a></li>
                <li><a href="#">Tiếng Anh</a></li>
            </ul>

        </div>
    </div>
</nav>

<!-- Bootstrap JS -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

</body>
</html>
</body>
</html>
